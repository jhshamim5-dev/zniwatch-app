name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web dependencies
        run: npm install

      - name: Install Capacitor Android
        run: npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/status-bar @capacitor/screen-orientation

      - name: Add Android platform
        run: |
          ls android/app 2>/dev/null || npx cap add android
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Configure Capacitor
        run: |
          cat > capacitor.config.ts << 'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.zniwatch.app',
            appName: 'ZniWatch',
            webDir: 'dist'
          };
          export default config;
          EOF

      - name: Build web app (Vite)
        run: npx vite build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zniwatch-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
